<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web App Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Syncopate', sans-serif;
        }
        .glassmorphism {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }
        .dark-neon {
            background: linear-gradient(180deg, #2b2b2b 0%, #1a1a1a 100%);
            color: #fff;
        }
        .skewed {
            transform: skewX(-10deg);
        }
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
    </style>
</head>
<body class="dark-neon">
    <div class="container mx-auto p-4 pt-6 md:p-6 lg:p-12 xl:p-24">
        <div class="skewed glassmorphism p-6 mb-6">
            <h1 class="text-3xl font-bold mb-4">Web App Dashboard</h1>
            <p class="text-lg">Functional interface for applications and data.</p>
        </div>
        <div class="bento-grid">
            <div class="glassmorphism p-6">
                <h2 class="text-2xl font-bold mb-4">Performance Stats</h2>
                <div class="flex flex-col">
                    <div class="mb-4">
                        <label class="block text-lg font-bold mb-2">Select a metric:</label>
                        <select class="block w-full p-2 text-lg border border-gray-400 rounded">
                            <option>Page Views</option>
                            <option>Unique Visitors</option>
                            <option>Bounce Rate</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="block text-lg font-bold mb-2">Select a date range:</label>
                        <input type="date" class="block w-full p-2 text-lg border border-gray-400 rounded">
                        <input type="date" class="block w-full p-2 text-lg border border-gray-400 rounded mt-2">
                    </div>
                    <button class="bg-purple-500 hover:bg-purple-700 text-white font-bold py-2 px-4 rounded" onclick="analyzeStats()">Analyze</button>
                </div>
                <div class="mt-6" id="stats-chart">
                    <!-- Animation will be appended here -->
                </div>
            </div>
            <div class="glassmorphism p-6">
                <h2 class="text-2xl font-bold mb-4">Data Visualization</h2>
                <img src="https://source.unsplash.com/400x300/?data,visualization" alt="Data Visualization" class="w-full h-full object-cover rounded">
            </div>
            <div class="glassmorphism p-6">
                <h2 class="text-2xl font-bold mb-4">Real-time Updates</h2>
                <ul class="list-none m-0 p-0">
                    <li class="py-2 border-b border-gray-400">Update 1</li>
                    <li class="py-2 border-b border-gray-400">Update 2</li>
                    <li class="py-2 border-b border-gray-400">Update 3</li>
                </ul>
            </div>
        </div>
    </div>
    <script>
        function analyzeStats() {
            const metric = document.querySelector('select').value;
            const startDate = document.querySelectorAll('input[type="date"]')[0].value;
            const endDate = document.querySelectorAll('input[type="date"]')[1].value;
            const chartContainer = document.getElementById('stats-chart');
            chartContainer.innerHTML = '';
            const chart = document.createElement('div');
            chart.className = 'h-64';
            chart.style.width = '100%';
            chart.style.background = 'linear-gradient(180deg, #6c5ce7 0%, #a29bfe 100%)';
            chart.style.borderRadius = '10px';
            chart.style.padding = '20px';
            chart.innerHTML = `
                <h2 class="text-2xl font-bold mb-4">${metric} Chart</h2>
                <div class="flex flex-col">
                    <div class="mb-4">
                        <label class="block text-lg font-bold mb-2">Value:</label>
                        <span class="block text-lg font-bold">1000</span>
                    </div>
                    <div class="mb-4">
                        <label class="block text-lg font-bold mb-2">Change:</label>
                        <span class="block text-lg font-bold">+10%</span>
                    </div>
                </div>
            `;
            chartContainer.appendChild(chart);
            // Add animation to chart
            chart.style.animation = 'grow 2s ease-in-out';
            chart.style.animationFillMode = 'forwards';
        }
    </script>
    <style>
        @keyframes grow {
            0% {
                transform: scale(0.5);
            }
            100% {
                transform: scale(1);
            }
        }
    </style>
</body>
</html>
