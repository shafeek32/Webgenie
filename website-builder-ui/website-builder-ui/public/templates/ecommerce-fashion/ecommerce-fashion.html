<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion E-commerce</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate&family=Outfit&family=Playfair+Display&display=swap" rel="stylesheet">
    <style>
        .skewed {
            transform: skewY(-10deg);
        }
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .glassmorphism {
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }
        .dark-neon {
            background: #2c2c2c;
            color: #fff;
        }
    </style>
</head>
<body class="dark-neon">
    <header class="skewed">
        <nav class="container mx-auto p-4 flex justify-between items-center">
            <a href="#" class="text-3xl font-bold text-white">Fashion E-commerce</a>
            <ul class="flex items-center space-x-4">
                <li><a href="#" class="text-lg text-white">Home</a></li>
                <li><a href="#" class="text-lg text-white">Collections</a></li>
                <li><a href="#" class="text-lg text-white">About</a></li>
            </ul>
        </nav>
    </header>
    <main class="container mx-auto p-4">
        <section class="bento-grid">
            <div class="glassmorphism p-4 rounded-lg">
                <h2 class="text-2xl font-bold mb-2">New Arrivals</h2>
                <img src="https://source.unsplash.com/300x200/?fashion,clothing" alt="New Arrivals" class="w-full h-full object-cover rounded-lg">
            </div>
            <div class="glassmorphism p-4 rounded-lg">
                <h2 class="text-2xl font-bold mb-2">Best Sellers</h2>
                <img src="https://source.unsplash.com/300x200/?fashion,best-sellers" alt="Best Sellers" class="w-full h-full object-cover rounded-lg">
            </div>
            <div class="glassmorphism p-4 rounded-lg">
                <h2 class="text-2xl font-bold mb-2">Sale</h2>
                <img src="https://source.unsplash.com/300x200/?fashion,sale" alt="Sale" class="w-full h-full object-cover rounded-lg">
            </div>
        </section>
        <section class="mt-4">
            <h2 class="text-3xl font-bold mb-2">Product Showcase</h2>
            <div class="flex space-x-4">
                <img src="https://source.unsplash.com/200x300/?fashion,clothing" alt="Product 1" class="w-full h-full object-cover rounded-lg">
                <img src="https://source.unsplash.com/200x300/?fashion,accessories" alt="Product 2" class="w-full h-full object-cover rounded-lg">
                <img src="https://source.unsplash.com/200x300/?fashion,shoes" alt="Product 3" class="w-full h-full object-cover rounded-lg">
            </div>
        </section>
        <section class="mt-4">
            <h2 class="text-3xl font-bold mb-2">Filter and Sort</h2>
            <div class="flex space-x-4">
                <select class="p-2 rounded-lg" id="filter">
                    <option value="all">All</option>
                    <option value="clothing">Clothing</option>
                    <option value="accessories">Accessories</option>
                    <option value="shoes">Shoes</option>
                </select>
                <select class="p-2 rounded-lg" id="sort">
                    <option value="price-asc">Price: Low to High</option>
                    <option value="price-desc">Price: High to Low</option>
                    <option value="alphabetical">Alphabetical</option>
                </select>
            </div>
        </section>
        <section class="mt-4">
            <h2 class="text-3xl font-bold mb-2">Price Range</h2>
            <input type="range" min="0" max="100" value="50" class="w-full" id="price-range">
            <div class="flex justify-between">
                <span>$0</span>
                <span>$100</span>
            </div>
        </section>
        <section class="mt-4">
            <h2 class="text-3xl font-bold mb-2">Simulation</h2>
            <div class="flex space-x-4">
                <input type="number" id="price" placeholder="Price" class="p-2 rounded-lg">
                <input type="number" id="discount" placeholder="Discount" class="p-2 rounded-lg">
                <button class="p-2 rounded-lg bg-white text-black" onclick="calculateDiscount()">Calculate Discount</button>
            </div>
            <p id="result"></p>
        </section>
    </main>
    <script>
        function calculateDiscount() {
            const price = document.getElementById('price').value;
            const discount = document.getElementById('discount').value;
            const result = price * (1 - discount / 100);
            document.getElementById('result').innerText = `Discounted Price: $${result.toFixed(2)}`;
        }
    </script>
</body>
</html>
