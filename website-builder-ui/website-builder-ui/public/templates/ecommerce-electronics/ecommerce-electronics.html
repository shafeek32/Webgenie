<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electronics E-commerce</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Outfit:wght@400;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Syncopate', sans-serif;
        }
        .glassmorph {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }
        .dark-neon {
            background: #1a1d23;
        }
        .vibe-first {
            background: linear-gradient(90deg, #6c5ce7, #3b3f54);
        }
        .skewed-container {
            transform: skewY(-5deg);
        }
        .skewed-child {
            transform: skewY(5deg);
        }
    </style>
</head>
<body class="dark-neon relative">
    <div class="vibe-first h-screen w-full relative">
        <div class="absolute top-0 left-0 w-full h-full bg-fixed" style="background-image: url('https://source.unsplash.com/1920x1080/?electronics, gadgets'); background-size: cover; background-position: center;"></div>
        <div class="container mx-auto p-4 pt-6 md:p-6 lg:p-12 xl:p-24 relative z-10">
            <div class="skewed-container">
                <div class="skewed-child glassmorph p-4 md:p-6 lg:p-12 xl:p-24">
                    <h1 class="text-3xl md:text-5xl lg:text-7xl xl:text-9xl font-bold text-white">Electronics E-commerce</h1>
                    <p class="text-lg md:text-2xl lg:text-3xl xl:text-5xl text-gray-400">Clean store for gadgets and hardware</p>
                </div>
            </div>
        </div>
    </div>
    <div class="container mx-auto p-4 pt-6 md:p-6 lg:p-12 xl:p-24">
        <h2 class="text-2xl md:text-4xl lg:text-6xl xl:text-8xl font-bold text-white">Featured Products</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6 lg:gap-12 xl:gap-24">
            <div class="glassmorph p-4 md:p-6 lg:p-12 xl:p-24">
                <img src="https://source.unsplash.com/300x200/?smartphone" alt="Smartphone" class="w-full h-full object-cover">
                <h3 class="text-lg md:text-2xl lg:text-3xl xl:text-5xl font-bold text-white">Smartphone</h3>
                <p class="text-lg md:text-2xl lg:text-3xl xl:text-5xl text-gray-400">$999</p>
            </div>
            <div class="glassmorph p-4 md:p-6 lg:p-12 xl:p-24">
                <img src="https://source.unsplash.com/300x200/?laptop" alt="Laptop" class="w-full h-full object-cover">
                <h3 class="text-lg md:text-2xl lg:text-3xl xl:text-5xl font-bold text-white">Laptop</h3>
                <p class="text-lg md:text-2xl lg:text-3xl xl:text-5xl text-gray-400">$1,299</p>
            </div>
            <div class="glassmorph p-4 md:p-6 lg:p-12 xl:p-24">
                <img src="https://source.unsplash.com/300x200/?tablet" alt="Tablet" class="w-full h-full object-cover">
                <h3 class="text-lg md:text-2xl lg:text-3xl xl:text-5xl font-bold text-white">Tablet</h3>
                <p class="text-lg md:text-2xl lg:text-3xl xl:text-5xl text-gray-400">$499</p>
            </div>
            <div class="glassmorph p-4 md:p-6 lg:p-12 xl:p-24">
                <img src="https://source.unsplash.com/300x200/?smartwatch" alt="Smartwatch" class="w-full h-full object-cover">
                <h3 class="text-lg md:text-2xl lg:text-3xl xl:text-5xl font-bold text-white">Smartwatch</h3>
                <p class="text-lg md:text-2xl lg:text-3xl xl:text-5xl text-gray-400">$299</p>
            </div>
        </div>
    </div>
    <div class="container mx-auto p-4 pt-6 md:p-6 lg:p-12 xl:p-24">
        <h2 class="text-2xl md:text-4xl lg:text-6xl xl:text-8xl font-bold text-white">Simulation</h2>
        <div class="glassmorph p-4 md:p-6 lg:p-12 xl:p-24">
            <label for="price" class="text-lg md:text-2xl lg:text-3xl xl:text-5xl font-bold text-white">Price:</label>
            <input type="number" id="price" class="w-full p-2 md:p-4 lg:p-6 xl:p-8 bg-gray-200 rounded">
            <label for="discount" class="text-lg md:text-2xl lg:text-3xl xl:text-5xl font-bold text-white">Discount:</label>
            <input type="number" id="discount" class="w-full p-2 md:p-4 lg:p-6 xl:p-8 bg-gray-200 rounded">
            <button class="w-full p-2 md:p-4 lg:p-6 xl:p-8 bg-gray-200 rounded" onclick="calculateTotal()">Calculate Total</button>
            <p id="total" class="text-lg md:text-2xl lg:text-3xl xl:text-5xl font-bold text-white"></p>
        </div>
    </div>
    <script>
        function calculateTotal() {
            const price = document.getElementById('price').value;
            const discount = document.getElementById('discount').value;
            const total = price - (price * discount / 100);
            document.getElementById('total').innerText = `Total: $${total}`;
        }
    </script>
</body>
</html>
